# YOLOv8 統一訓練設定檔 (MLOps 分層管理)

# =====================================================================
# 1. Rebuild (重建模式)
# 【使用時機】: 
#    - 專案剛啟動，建立第一個基準模型 (Baseline) 時。
#    - 資料集有重大更新 (例如新增了全新的類別)。
#    - 當前模型表現極差，需要徹底重新訓練時。
# 【特點】: 學習率最高 (0.01)，鼓勵模型大幅修正權重以適應全局資料。
# =====================================================================
rebuild:
  epochs: 100
  imgsz: 768
  batch: 16
  patience: 50
  lr0: 0.01
  mosaic: 0.8
  degrees: 0.0
  fliplr: 0.5
  hsv_v: 0.4
  cls: 0.8
# =====================================================================
# 2. Incremental (增量模式)
# 【使用時機】: 
#    - 已經有穩定的基礎模型，現在要加入「新採集」的圖標 (例如 2_img, 3_img)。
#    - 定期進行資料補強，但不希望破壞原有的辨識能力。
# 【特點】: 學習率中等 (0.001)，採用「溫和學習」策略，保護已學到的基礎特徵。
# =====================================================================
incremental:
  epochs: 60
  imgsz: 832
  batch: 16
  patience: 20
  lr0: 0.001
  mosaic: 0.2
  degrees: 0.0
  fliplr: 0.5
  hsv_v: 0.2
  cls: 0.8
# =====================================================================
# 3. Specialized (特化模式)
# 【使用時機】: 
#    - 針對特定的「痛點」進行修補 (例如：某個門總是誤報、某種光線下總是漏抓)。
#    - 用於處理由 analyze_errors.py 挑選出的「難樣本 (Hard Samples)」。
# 【特點】: 學習率最低 (0.0005)，關閉大部份增強 (如 Mosaic)，進行精準的「標靶治療」。
# =====================================================================
specialized:
  epochs: 30
  imgsz: 768
  batch: 16
  patience: 10
  lr0: 0.0005
  mosaic: 0.0
  degrees: 0.0
  fliplr: 0.5
  hsv_v: 0.1
  cls: 1.3
